# self-management graph-product image を Artifact Registry に build + push する設定。
#
# 使い方:
#   gcloud builds submit --region=asia-northeast1 --config=cloudbuild.yaml .
#
# repo root から実行する前提で、Dockerfile path は apps/graph/product/Dockerfile を指定。

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'apps/graph/product/Dockerfile'
      - '-t'
      - '${_IMAGE}'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE}'

images:
  - '${_IMAGE}'

substitutions:
  _IMAGE: 'asia-northeast1-docker.pkg.dev/${PROJECT_ID}/self-mgmt/graph-product:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true
