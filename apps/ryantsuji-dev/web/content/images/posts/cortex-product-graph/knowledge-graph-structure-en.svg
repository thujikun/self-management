    <line x1="880" y1="935" x2="1100" y2="1010" stroke="#38bdf8" stroke-width="1.8" opacity="0.85" marker-end="url(#a-38bdf8)"/>
    <text x="990" y="985" fill="#38bdf8" opacity="0.95" font-weight="bold">HAS_COLUMN</text>

