  <!-- Title -->
  <text x="800" y="56" font-size="32" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="sans-serif">Product Graph -- code, DB, infra, and docs on the same node set</text>
  <text x="800" y="92" font-size="20" fill="#94a3b8" text-anchor="middle" font-family="sans-serif">A slice of cpg itself. Function / BigQueryTable / Column / Pulumi resource / docs / external services -- all connected by edges</text>

  <!-- Legend -->
  <g font-family="sans-serif" font-size="18">
    <circle cx="100" cy="142" r="11" fill="#1a2818" stroke="#4ade80" stroke-width="2"/>
    <text x="120" y="148" fill="#cbd5e1">Function</text>

    <circle cx="280" cy="142" r="11" fill="#0d2030" stroke="#38bdf8" stroke-width="2"/>
