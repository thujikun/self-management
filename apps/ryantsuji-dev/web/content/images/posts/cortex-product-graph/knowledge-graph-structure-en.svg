    <circle cx="600" cy="142" r="11" fill="#1a1525" stroke="#a78bfa" stroke-width="2"/>
    <text x="620" y="148" fill="#cbd5e1">Pulumi / CronSchedule / CloudRunJob</text>

    <circle cx="1010" cy="142" r="11" fill="#25190d" stroke="#f59e0b" stroke-width="2"/>
