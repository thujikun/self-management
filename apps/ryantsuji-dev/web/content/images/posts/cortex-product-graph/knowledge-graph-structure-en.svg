  <!-- =================================================================== -->

  <g font-family="sans-serif" font-size="18">
    <!-- parseJSDocExports -> applyGraphTag (calls) -->
    <line x1="280" y1="330" x2="280" y2="500" stroke="#4ade80" stroke-width="2" opacity="0.9" marker-end="url(#a-4ade80)"/>
    <text x="296" y="425" fill="#4ade80" font-weight="bold">calls</text>

    <!-- applyGraphTag -> generateEmbeddings (calls) -->
    <line x1="345" y1="558" x2="690" y2="600" stroke="#4ade80" stroke-width="2" opacity="0.9" marker-end="url(#a-4ade80)"/>
    <text x="450" y="565" fill="#4ade80" font-weight="bold">calls</text>

