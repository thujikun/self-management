    <line x1="800" y1="675" x2="830" y2="850" stroke="#38bdf8" stroke-width="2.2" marker-end="url(#a-38bdf8)"/>
    <text x="828" y="770" fill="#38bdf8" font-weight="bold">queries [via:id]</text>

