<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940">
  <rect width="1600" height="940" fill="#0f172a"/>

  <defs>
    <marker id="a-94a3b8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
    <marker id="a-4ade80" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/></marker>
    <marker id="a-38bdf8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/></marker>
    <marker id="a-fb923c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fb923c"/></marker>
  </defs>

  <!-- Title -->
  <text x="800" y="56" font-size="30" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="sans-serif">Build Pipeline -- assembling one knowledge graph from JSDoc, Pulumi, and docs</text>
  <text x="800" y="92" font-size="18" fill="#94a3b8" text-anchor="middle" font-family="sans-serif">Runs on every push to main. Differential embedding keeps typical push cost under $0.001</text>

  <!-- Phase labels at top -->
  <g font-family="sans-serif" font-size="18">
    <text x="190" y="150" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Input (SSoT)</text>
    <text x="540" y="150" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Parse</text>
    <text x="850" y="150" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Node / Edge generation</text>
    <text x="1170" y="150" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Diff embedding</text>
    <text x="1450" y="150" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Store</text>
  </g>

  <!-- ============= Inputs (SSoT) ============= -->
  <g font-family="sans-serif">
    <rect x="60" y="180" width="260" height="100" rx="12" fill="#1a2818" stroke="#4ade80" stroke-width="2"/>
    <text x="190" y="216" font-size="18" fill="#4ade80" text-anchor="middle" font-weight="bold">apps/ · packages/</text>
    <text x="190" y="240" font-size="15" fill="#cbd5e1" text-anchor="middle">TypeScript</text>
    <text x="190" y="262" font-size="13" fill="#94a3b8" text-anchor="middle">with JSDoc @graph-* tags</text>

    <rect x="60" y="310" width="260" height="100" rx="12" fill="#1a1525" stroke="#a78bfa" stroke-width="2"/>
    <text x="190" y="346" font-size="18" fill="#a78bfa" text-anchor="middle" font-weight="bold">infra/</text>
    <text x="190" y="370" font-size="15" fill="#cbd5e1" text-anchor="middle">Pulumi</text>
    <text x="190" y="392" font-size="13" fill="#94a3b8" text-anchor="middle">JSDoc @graph-* + description</text>

    <rect x="60" y="440" width="260" height="100" rx="12" fill="#25190d" stroke="#f59e0b" stroke-width="2"/>
    <text x="190" y="476" font-size="18" fill="#f59e0b" text-anchor="middle" font-weight="bold">docs/</text>
    <text x="190" y="500" font-size="15" fill="#cbd5e1" text-anchor="middle">Markdown</text>
    <text x="190" y="522" font-size="13" fill="#94a3b8" text-anchor="middle">docs/{category}/{name}.md convention</text>
  </g>

  <!-- ============= Parser ============= -->
  <g font-family="sans-serif">
    <rect x="410" y="180" width="260" height="100" rx="12" fill="#0d1f2d" stroke="#38bdf8" stroke-width="2"/>
    <text x="540" y="216" font-size="18" fill="#38bdf8" text-anchor="middle" font-weight="bold">jsdoc-parser</text>
    <text x="540" y="240" font-size="14" fill="#cbd5e1" text-anchor="middle">AST analysis via ts-morph</text>
    <text x="540" y="262" font-size="13" fill="#94a3b8" text-anchor="middle">extract @graph-* from all declarations</text>

    <rect x="410" y="310" width="260" height="100" rx="12" fill="#0d1f2d" stroke="#38bdf8" stroke-width="2"/>
    <text x="540" y="346" font-size="18" fill="#38bdf8" text-anchor="middle" font-weight="bold">pulumi-bq-parser</text>
    <text x="540" y="370" font-size="14" fill="#cbd5e1" text-anchor="middle">from schema definitions</text>
    <text x="540" y="392" font-size="13" fill="#94a3b8" text-anchor="middle">table / column / description</text>

    <rect x="410" y="440" width="260" height="100" rx="12" fill="#0d1f2d" stroke="#38bdf8" stroke-width="2"/>
    <text x="540" y="476" font-size="18" fill="#38bdf8" text-anchor="middle" font-weight="bold">docs-parser</text>
    <text x="540" y="500" font-size="14" fill="#cbd5e1" text-anchor="middle">from directory convention</text>
    <text x="540" y="522" font-size="13" fill="#94a3b8" text-anchor="middle">infer stack / domain</text>
  </g>

  <!-- Arrows: input -> parser -->
  <g>
    <line x1="320" y1="230" x2="410" y2="230" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>
    <path d="M 320 330 Q 365 290 410 250" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a-94a3b8)"/>
    <line x1="320" y1="360" x2="410" y2="360" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>
    <line x1="320" y1="490" x2="410" y2="490" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>
  </g>

  <!-- ============= Generator (merged) ============= -->
  <g font-family="sans-serif">
    <rect x="720" y="240" width="260" height="270" rx="14" fill="#1a1a2e" stroke="#94a3b8" stroke-width="2"/>
    <text x="850" y="280" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="bold">generator</text>
    <text x="850" y="308" font-size="15" fill="#cbd5e1" text-anchor="middle">ProductGraphNode[]</text>
    <text x="850" y="328" font-size="15" fill="#cbd5e1" text-anchor="middle">ProductGraphEdge[]</text>

    <line x1="740" y1="348" x2="960" y2="348" stroke="#475569" stroke-width="1"/>

    <text x="850" y="374" font-size="13" fill="#94a3b8" text-anchor="middle">qualifiedName = filePath:exportName</text>
    <text x="850" y="394" font-size="13" fill="#94a3b8" text-anchor="middle">edge = 1 per @graph-connects entry</text>
    <text x="850" y="414" font-size="13" fill="#94a3b8" text-anchor="middle">same-name merge: stub -&gt; rich node</text>
    <text x="850" y="434" font-size="13" fill="#94a3b8" text-anchor="middle">documented_by: auto on stack match</text>

    <text x="850" y="480" font-size="14" fill="#4ade80" text-anchor="middle" font-weight="bold">-> 4 layers in the same ID space</text>
  </g>

  <!-- Arrows: parser -> generator -->
  <g>
    <line x1="670" y1="230" x2="720" y2="310" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>
    <line x1="670" y1="360" x2="720" y2="375" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>
    <line x1="670" y1="490" x2="720" y2="440" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>
  </g>

  <!-- ============= Embedding generator ============= -->
  <g font-family="sans-serif">
    <rect x="1040" y="240" width="260" height="270" rx="14" fill="#251a0d" stroke="#fb923c" stroke-width="2"/>
    <text x="1170" y="280" font-size="19" fill="#fb923c" text-anchor="middle" font-weight="bold">generateEmbeddings</text>
    <text x="1170" y="306" font-size="14" fill="#cbd5e1" text-anchor="middle">call Vertex AI for diff only</text>

    <line x1="1060" y1="326" x2="1280" y2="326" stroke="#475569" stroke-width="1"/>

    <text x="1170" y="354" font-size="13" fill="#94a3b8" text-anchor="middle">Compare existing BQ</text>
    <text x="1170" y="374" font-size="13" fill="#94a3b8" text-anchor="middle">textForEmbedding hash vs new text</text>
    <text x="1170" y="404" font-size="13" fill="#cbd5e1" text-anchor="middle">unchanged: reuse BQ embedding</text>
    <text x="1170" y="424" font-size="13" fill="#cbd5e1" text-anchor="middle">changed: send to Vertex AI</text>

    <text x="1170" y="476" font-size="14" fill="#fb923c" text-anchor="middle" font-weight="bold">typical push: under $0.001</text>
  </g>

  <!-- Arrow: generator -> embedding -->
  <line x1="980" y1="375" x2="1040" y2="375" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>

  <!-- ============= BigQuery ============= -->
  <g font-family="sans-serif">
    <rect x="1340" y="240" width="220" height="270" rx="14" fill="#0d2030" stroke="#38bdf8" stroke-width="2.5"/>
    <text x="1450" y="280" font-size="19" fill="#38bdf8" text-anchor="middle" font-weight="bold">BigQuery</text>

    <line x1="1360" y1="304" x2="1540" y2="304" stroke="#475569" stroke-width="1"/>

    <text x="1450" y="338" font-size="13" fill="#cbd5e1" text-anchor="middle">cortex.</text>
    <text x="1450" y="358" font-size="15" fill="#38bdf8" text-anchor="middle" font-weight="bold">product_graph_nodes</text>
    <text x="1450" y="398" font-size="13" fill="#cbd5e1" text-anchor="middle">cortex.</text>
    <text x="1450" y="418" font-size="15" fill="#38bdf8" text-anchor="middle" font-weight="bold">product_graph_edges</text>
    <text x="1450" y="468" font-size="13" fill="#94a3b8" text-anchor="middle">MERGE -- managed per snapshot</text>
  </g>

  <!-- Arrow: embedding -> BQ -->
  <line x1="1300" y1="375" x2="1340" y2="375" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>

  <!-- ============= External services ============= -->
  <g font-family="sans-serif">
    <rect x="1040" y="590" width="260" height="100" rx="12" fill="#251a0d" stroke="#fb923c" stroke-width="2"/>
    <text x="1170" y="624" font-size="17" fill="#fb923c" text-anchor="middle" font-weight="bold">Vertex AI Embedding</text>
    <text x="1170" y="648" font-size="14" fill="#cbd5e1" text-anchor="middle">gemini-embedding-2</text>
    <text x="1170" y="670" font-size="13" fill="#94a3b8" text-anchor="middle">text of diff nodes only</text>
  </g>
  <line x1="1170" y1="510" x2="1170" y2="590" stroke="#fb923c" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#a-fb923c)"/>

  <!-- ============= MCP at bottom ============= -->
  <g font-family="sans-serif">
    <rect x="1340" y="590" width="220" height="100" rx="12" fill="#1a2818" stroke="#4ade80" stroke-width="2"/>
    <text x="1450" y="624" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">cortex-product-graph</text>
    <text x="1450" y="648" font-size="14" fill="#cbd5e1" text-anchor="middle">MCP server</text>
    <text x="1450" y="670" font-size="13" fill="#94a3b8" text-anchor="middle">read side for AI</text>
  </g>
  <line x1="1450" y1="510" x2="1450" y2="590" stroke="#4ade80" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#a-4ade80)"/>

  <!-- Trigger annotations -->
  <g font-family="sans-serif">
    <rect x="60" y="780" width="700" height="100" rx="10" fill="#0d1f2d" stroke="#475569" stroke-width="1.5"/>
    <text x="80" y="816" font-size="17" fill="#cbd5e1" font-weight="bold">Trigger:</text>
    <text x="190" y="816" font-size="16" fill="#cbd5e1">GitHub Actions fires on push to main</text>
    <text x="80" y="850" font-size="15" fill="#94a3b8">Typical push has ~dozens of node diffs -- reflected in BQ in seconds</text>
  </g>

  <g font-family="sans-serif">
    <rect x="800" y="780" width="760" height="100" rx="10" fill="#0d1f2d" stroke="#475569" stroke-width="1.5"/>
    <text x="820" y="816" font-size="17" fill="#cbd5e1" font-weight="bold">Full regeneration:</text>
    <text x="990" y="816" font-size="16" fill="#cbd5e1">triggered via workflow_dispatch for recovery</text>
    <text x="820" y="850" font-size="15" fill="#94a3b8">~$0.075 for 8,000+ nodes (all sent to Vertex AI)</text>
  </g>
</svg>
