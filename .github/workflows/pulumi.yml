# Pulumi infra workflow。
#
# - PR: `infra/**` 配下に変更があれば各 stack で `pulumi preview` を走らせ、
#   PR comment に diff を貼る (pulumi/actions の `comment-on-pr` 機能)
# - main: `infra/**` 配下に変更があれば各 stack で `pulumi up --yes` を走らせる (auto-apply)
#
# auth: GCP Workload Identity Federation。GitHub OIDC token を `pulumi-ci@` SA に
# impersonate。long-lived JSON key 不使用 (infra/core/index.ts で declarative 管理)。
#
# secrets / vars (GitHub repo settings):
# - secret: PULUMI_ACCESS_TOKEN (Pulumi Cloud personal access token)
# - var: GCP_PROJECT_ID (例: "ryan-self-management")
# - var: GCP_PROJECT_NUMBER (例: "600456222971"、WIF provider URI 構築用)
# - var: PULUMI_CI_SA_EMAIL (例: "pulumi-ci@ryan-self-management.iam.gserviceaccount.com")
# - var: PULUMI_ORG (例: "tsuji-0107-gmail-com")
#
# 注: Pulumi state encryption は Cloud KMS で完結するため PULUMI_CONFIG_PASSPHRASE は不要。
# Cloudflare provider token は WIF 経由で GCP Secret Manager `cloudflare-api-token` から
# 動的取得し、CLOUDFLARE_API_TOKEN env として step に flow する (ryantsuji-dev job のみ必要)。
name: Pulumi

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/pulumi.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/pulumi.yml"

# 同一 PR / branch では先行 run を cancel して最新だけ残す。
concurrency:
  group: pulumi-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# WIF を使うために id-token: write が必須。
permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  core:
    name: Pulumi core (preview on PR / up on main)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/core
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github-actions
          service_account: ${{ vars.PULUMI_CI_SA_EMAIL }}

      - name: Pulumi ${{ github.event_name == 'pull_request' && 'preview' || 'up' }}
        uses: pulumi/actions@v6
        with:
          command: ${{ github.event_name == 'pull_request' && 'preview' || 'up' }}
          stack-name: ${{ vars.PULUMI_ORG }}/ryan
          work-dir: infra/core
          comment-on-pr: ${{ github.event_name == 'pull_request' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          GOOGLE_CLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID }}
          # pulumi の 3rd-party plugin downloader (例: @pulumiverse/grafana) は
          # api.github.com に直接アクセスする。unauthenticated だと 60 req/hr の
          # rate limit に当たって 403 で fail するため、GITHUB_TOKEN を env に
          # 渡して authenticated (5000 req/hr) で叩かせる。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ryantsuji-dev:
    name: Pulumi ryantsuji-dev (preview on PR / up on main)
    runs-on: ubuntu-latest
    needs: core
    defaults:
      run:
        working-directory: infra/ryantsuji-dev
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Authenticate to Google Cloud (WIF)
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github-actions
          service_account: ${{ vars.PULUMI_CI_SA_EMAIL }}

      # ryantsuji-dev stack の cloudflare provider は CLOUDFLARE_API_TOKEN env を読む。
      # Secret Manager から動的取得して job env に注入 (workflow yaml に直書きしない)。
      - name: Fetch CLOUDFLARE_API_TOKEN from Secret Manager
        id: cf-token
        run: |
          token=$(gcloud secrets versions access latest \
            --secret=cloudflare-api-token \
            --project=${{ vars.GCP_PROJECT_ID }})
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Pulumi ${{ github.event_name == 'pull_request' && 'preview' || 'up' }}
        uses: pulumi/actions@v6
        with:
          command: ${{ github.event_name == 'pull_request' && 'preview' || 'up' }}
          stack-name: ${{ vars.PULUMI_ORG }}/ryan
          work-dir: infra/ryantsuji-dev
          comment-on-pr: ${{ github.event_name == 'pull_request' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          GOOGLE_CLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ steps.cf-token.outputs.token }}
          # core 側と同じく 3rd-party plugin download の rate limit 回避用。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
