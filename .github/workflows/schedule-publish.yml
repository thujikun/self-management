# 予約投稿 (scheduled publish) の cron driver。
#
# 仕組み:
# - `apps/ryantsuji-dev/web/content/posts/` 内の `draft: true` で `publishedAt`
#   が現在時刻以下になった post の frontmatter から `draft:` 行を物理的に消す
# - 削除対象は **submodule (`thujikun/ryantsuji-dev-content`) 内側のファイル** な
#   ので、(1) submodule 内で deploy key 経由で commit + push → (2) 親 repo 側で
#   submodule pointer を bump して push、の二段 commit にする
# - 続けて `gh workflow run --ref main` で `deploy-ryantsuji-dev.yml` と
#   `syndicate-posts.yml` を `workflow_dispatch` 経由で発火させ、ryantsuji.dev /
#   Zenn / dev.to に公開を伝播する
#
# downstream 発火を明示 dispatch にする理由:
#   GitHub Actions の仕様で `secrets.GITHUB_TOKEN` を credential として push した
#   event は他 workflow の `on: push` を trigger しない (`workflow_dispatch` /
#   `repository_dispatch` のみ例外)。本 workflow は GITHUB_TOKEN で push するので、
#   downstream は明示 dispatch でしか発火できない。
#
# 頻度: 15 分間隔。`publishedAt` を datetime + TZ offset (`+09:00` / `-07:00` 等)
# で指定すれば公開時刻の最大 15 分遅延で flip される。
#
# permissions:
# - `contents: write` — 親 repo 側 (= submodule pointer bump) の bot commit + push 用
# - `actions: write` — `gh workflow run` で downstream を dispatch するため
# - `id-token: write` — WIF (GCP Secret Manager で deploy key を取得) 用
name: Schedule publish

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  id-token: write

concurrency:
  group: schedule-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  schedule-publish:
    name: Flip draft → published if publishedAt reached
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout (with write token)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          submodules: true

      - uses: ./.github/actions/setup

      # submodule (ryantsuji-dev-content) への push に SSH deploy key を使う。
      # syndicate-posts.yml と同じ key (`ryantsuji-dev-content-deploy-key`、SSoT
      # は GCP Secret Manager) を再利用する。詳細は apps/ryantsuji-dev/web/README.md。
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github-actions
          service_account: ${{ vars.PULUMI_CI_SA_EMAIL }}

      - name: Setup SSH deploy key for ryantsuji-dev-content
        run: |
          key=$(gcloud secrets versions access latest \
            --secret=ryantsuji-dev-content-deploy-key \
            --project=${{ vars.GCP_PROJECT_ID }})
          mkdir -p ~/.ssh
          printf '%s\n' "$key" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

      # `--global` 必須: 親 repo / submodule 双方で identity を効かせる
      # (submodule clone は parent の config を継承しない経路がある)。
      - name: Configure git identity (bot)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # submodule の origin URL を SSH に切替えて、deploy key で push できるように
      # する。`actions/checkout` は `submodules: true` でも parent の HTTPS+
      # GITHUB_TOKEN credential を継承するので、submodule 側へ push しようとすると
      # 403 になる (deploy key は SSH 専用)。
      - name: Switch submodule remote to SSH
        run: |
          git -C apps/ryantsuji-dev/web/content remote set-url origin \
            git@github.com:thujikun/ryantsuji-dev-content.git

      # schedule-publish.cli.ts は対象 post の frontmatter を上書きし、
      # `PUBLISHED <filename>` を 1 行ずつ stdout に書く。何も無ければ exit 0
      # で stdout は説明行のみ。
      - name: Run schedule-publish
        id: run
        run: |
          out=$(pnpm exec tsx scripts/schedule-publish.cli.ts)
          echo "$out"
          # PUBLISHED 行から slug を抽出 (commit subject 用)。0 マッチで grep が
          # exit 1 を返すと shell の `-o pipefail` で step が失敗するため、
          # 「no-op の cron tick = 正常」を保つ意図で `|| true` を末尾に付け、
          # 戻り値の責務を slugs の空判定 (`steps.run.outputs.slugs != ''`) に
          # 寄せる (= 失敗判定は grep の exit code ではなく後段の if で行う)。
          slugs=$(echo "$out" | grep -E "^PUBLISHED " | sed -E 's/^PUBLISHED ([^.]+)\.(en|ja)\.md$/\1/' | sort -u | tr '\n' ',' | sed 's/,$//' | sed 's/,/, /g' || true)
          echo "slugs=$slugs" >> "$GITHUB_OUTPUT"

      # 二段 commit: (1) submodule 内側で content repo に push → (2) 親 repo の
      # submodule pointer を bump して push。親 repo の `git add posts/` を打って
      # も submodule 内部のパスは pathspec として届かない (`fatal: ... is in
      # submodule` または空 stage) ので、submodule 内 commit を経由して pointer を
      # 進める必要がある。
      - name: Commit & push if any post flipped
        if: steps.run.outputs.slugs != ''
        run: |
          # 1) submodule 内側で content repo に push (deploy key, SSH 経由)
          pushd apps/ryantsuji-dev/web/content
          git add posts/
          # subject は固定文字列にして commitlint の 100 字 header cap を踏まない
          # (複数 slug が同 tick で flip すると slug 列挙だけで 100 字を超え得る)。
          # slug 一覧は本文側に残して audit trail を保つ。
          git commit \
            -m "chore(content): publish scheduled posts" \
            -m "slugs: ${{ steps.run.outputs.slugs }}"
          git push origin HEAD:main
          popd
          # 2) 親 repo の submodule pointer を bump
          git add apps/ryantsuji-dev/web/content
          git commit \
            -m "chore(content): bump submodule pointer (scheduled publish)" \
            -m "slugs: ${{ steps.run.outputs.slugs }}"
          # syndicate / deploy workflow は GITHUB_TOKEN 経由の push では発火しない
          # ので、push 後に下の dispatch step で明示的に叩く。`[skip ci]` も付けない
          # (将来 path filter trigger が復活した時の保険)。
          git push origin HEAD:main

      # deploy は draft flip が発生した時だけ呼ぶ (= content 変更を CF Worker に
      # 反映する)。GITHUB_TOKEN で push しても downstream の `on: push` は鳴らない
      # 仕様なので明示 dispatch する (`actions: write` 必須)。
      - name: Dispatch deploy (only when posts flipped)
        if: steps.run.outputs.slugs != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-ryantsuji-dev.yml --ref main

      # syndicate は毎 tick 走らせる。`syndication.<target>.publishAt` を frontmatter
      # に設定した post を時刻到達で自動的に `published: true` に flip するため、
      # 「post が flip されたかどうか」とは独立に poll する必要がある。content 無変更の
      # 通常 tick でも syndicator が「no change」を出して即 exit するだけなので副作用は薄い。
      - name: Dispatch syndicate (always — to evaluate per-target publishAt)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run syndicate-posts.yml --ref main
