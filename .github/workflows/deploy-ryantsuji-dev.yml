# ryantsuji-dev (CF Workers) deploy workflow。
#
# - PR: `apps/ryantsuji-dev/web/**` / `packages/**` / `pnpm-lock.yaml` に変更が
#   入っていれば `wrangler deploy --dry-run` を走らせ、build 失敗を早期検知する
# - main: 同 path に push があったら DB migration を適用してから
#   `wrangler deploy` で CF Worker を本番反映
#
# DB migration は `pnpm --filter @self/db migrate:apply` (`drizzle-orm/neon-http/
# migrator`) で `__drizzle_migrations` table の hash 比較により未適用分だけ
# atomic に流す idempotent script。Worker deploy より先に走らせることで、新 schema
# を参照する Worker code が runtime で table not found に当たるのを防ぐ。PR run
# は dry-run なので migration step は skip (DB に副作用を出さない)。
#
# auth: pulumi.yml と同じ WIF flow。GitHub OIDC → `pulumi-ci@` SA を impersonate
# (pulumi が既に運用している identity を再利用。将来 deploy 専用 SA を分けるなら
# `vars.PULUMI_CI_SA_EMAIL` の参照先を DEPLOY_SA_EMAIL 等に切替)。
# その上で `gcloud secrets versions access <name>` で各 secret を動的に取り出し、
# job env に注入する (workflow yaml に直書きしない)。
#
# 必要な secret (GCP Secret Manager、現状は `pulumi-ci@` SA が project レベルの
# `roles/secretmanager.admin` で読み出している。`infra/core/index.ts` で
# `graph-app` SA にも secretAccessor を bind 済だが、これは将来 deploy 専用 SA を
# 分離した時に同パターンで bind し直す用途で、本 workflow の実行 SA ではない):
# - `cloudflare-api-token` (Workers Scripts:Edit + Workers Routes:Edit)
# - `neon-database-url` (Neon Postgres の pooled connection string)
#
# SSoT は infra/core/index.ts で Pulumi 管理、`.envrc` でも同じ container を引いてる。
#
# secrets / vars (pulumi.yml と共有):
# - var: GCP_PROJECT_ID
# - var: GCP_PROJECT_NUMBER
# - var: PULUMI_CI_SA_EMAIL (deploy 専用 SA を分けたら DEPLOY_SA_EMAIL 等に切替)
name: Deploy ryantsuji-dev

on:
  push:
    branches: [main]
    paths:
      - "apps/ryantsuji-dev/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-ryantsuji-dev.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/ryantsuji-dev/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-ryantsuji-dev.yml"

# 同一 branch では先行 run を cancel して最新のみ deploy する。pulumi.yml と違って
# `cancel-in-progress: true` にするのは、deploy は最新だけ反映されれば良く、途中
# キャンセルしても CF 側に半端な状態が残らないため。
concurrency:
  group: deploy-ryantsuji-dev-${{ github.ref }}
  cancel-in-progress: true

# WIF を使うために id-token: write が必須。
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: ${{ github.event_name == 'pull_request' && 'wrangler deploy --dry-run' || 'wrangler deploy' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ryantsuji-dev/web
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github-actions
          service_account: ${{ vars.PULUMI_CI_SA_EMAIL }}

      # CF API token は SSoT (GCP Secret Manager `cloudflare-api-token`) から動的取得。
      # ::add-mask:: で log mask 化してから job env に注入する。
      - name: Fetch CLOUDFLARE_API_TOKEN from Secret Manager
        id: cf-token
        run: |
          token=$(gcloud secrets versions access latest \
            --secret=cloudflare-api-token \
            --project=${{ vars.GCP_PROJECT_ID }})
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      # DB migration は main push の時だけ実行 (PR は build 通すだけで DB 副作用 0)。
      # SSoT は GCP Secret Manager `neon-database-url`。`drizzle-orm/neon-http/
      # migrator` の hash 比較で未適用分だけ atomic に流れるため、再 run も safe。
      - name: Fetch DATABASE_URL from Secret Manager
        if: github.event_name == 'push'
        id: db-url
        run: |
          url=$(gcloud secrets versions access latest \
            --secret=neon-database-url \
            --project=${{ vars.GCP_PROJECT_ID }})
          echo "::add-mask::$url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Apply DB migrations (drizzle migrator)
        if: github.event_name == 'push'
        working-directory: .
        run: pnpm --filter @self/db migrate:apply
        env:
          DATABASE_URL: ${{ steps.db-url.outputs.url }}

      # web の vite build は workspace dep `@self/design-tokens` の dist/tokens.css を
      # `@import "@self/design-tokens/css"` で読むため、deploy 前に upstream workspace
      # dep を turbo で build しておく (`^...` で本 package 自身は除外し dep のみ)。
      # これを忘れると postcss-import が `ENOENT: open '@self/design-tokens/css'` で落ちる。
      - name: Build upstream workspace deps (turbo)
        working-directory: .
        run: pnpm turbo run build --filter=@self/ryantsuji-dev-web^...

      # PR は dry-run (build 通すだけ、CF への upload 無し)、main は本番 deploy。
      - name: ${{ github.event_name == 'pull_request' && 'pnpm run deploy:dry' || 'pnpm run deploy' }}
        run: pnpm run ${{ github.event_name == 'pull_request' && 'deploy:dry' || 'deploy' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.cf-token.outputs.token }}
