# ryantsuji.dev の post markdown を main push 時に Zenn / dev.to に自動同期する workflow。
#
# trigger: `apps/ryantsuji-dev/web/content/posts/**` / `packages/syndication/**` /
# `scripts/syndicate*` の変更を main に push した時。
#
# 設計:
# - source markdown の SoT は本 repo (self-management) の `apps/ryantsuji-dev/web/content/posts/`
# - dev.to: API (`POST /api/articles` で新規作成、`PUT /api/articles/<id>` で更新)
# - Zenn: 別 repo `thujikun/ryantsuji-dev-content` の `articles/<id>.md` に commit/push
#   → Zenn の GitHub sync が拾って公開
#
# **frontmatter writeback**:
#   `scripts/syndicate.ts` は新規記事に `syndication.zenn.id` (= randomBytes(7) hex) と
#   `syndication.devto.{id,slug}` (= dev.to POST レスポンスから) を frontmatter に書き
#   戻す。content/posts/ は submodule (`thujikun/ryantsuji-dev-content`) なので、
#   書き戻し後に (1) submodule 内側で deploy key 経由で commit + push → (2) 親 repo
#   の submodule pointer を bump、の二段 commit にする。親 repo から `git add` で
#   submodule 内部のパスを stage しようとしても pathspec が届かないため。
#
# **secret 要件** (GCP Secret Manager に事前投入):
# - `dev-to-api-key`: dev.to API key (Settings → Extensions → DEV API Keys)
# - `ryantsuji-dev-content-deploy-key`: thujikun/ryantsuji-dev-content の
#   Deploy Key (write 有効) の **秘密鍵全文** (Ed25519、改行 \n 込み)。
#   workflow 側で `~/.ssh/id_ed25519` に書き出し、`git@github.com:...` URL で
#   clone/push する
#
# secrets / vars (pulumi.yml / deploy-ryantsuji-dev.yml と共有):
# - var: GCP_PROJECT_ID
# - var: GCP_PROJECT_NUMBER
# - var: PULUMI_CI_SA_EMAIL (WIF 用 SA、Secret Manager:Access 権限を持つ)
name: Syndicate posts

on:
  push:
    branches: [main]
    paths:
      - "apps/ryantsuji-dev/web/content/posts/**"
      - "packages/syndication/**"
      - "scripts/syndicate.ts"
      - "scripts/syndicate.cli.ts"
      - ".github/workflows/syndicate-posts.yml"
  # 15 分間隔で再評価する目的: post 本体の merge 後も `syndication.<target>.publishAt`
  # が未来日付の post は target に push されていない。時刻到達で publish を flip する
  # ためだけに cron を回す (no-op tick は syndicator が即 exit するので副作用は薄い)。
  schedule:
    - cron: "*/15 * * * *"
  # bump-submodule.yml が PR を auto-merge した後の発火経路 (`on: push` で間接的に
  # 鳴るが、手動 retry 用にも残す)。
  workflow_dispatch:

# - contents: write は frontmatter writeback 用の git commit + push
# - id-token: write は WIF (Secret Manager 取得) 用
concurrency:
  group: syndicate-${{ github.ref }}
  # 同一 branch で並列 run が走ると writeback の競合が発生するため queue 化 (cancel しない)
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  syndicate:
    name: Syndicate to Zenn + dev.to
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout (with write token)
        uses: actions/checkout@v6
        with:
          # writeback commit + push のため persist-credentials: true (default) で
          # GITHUB_TOKEN を git remote の auth として握る。
          token: ${{ secrets.GITHUB_TOKEN }}
          # `git commit + git pull --rebase` で最新を取り込むため shallow ではなく
          # 履歴を持つ (default の fetch-depth: 1 だと rebase が失敗する)。
          fetch-depth: 0
          submodules: true

      - uses: ./.github/actions/setup

      # `scripts/syndicate.ts` は `@self/content` の dist (`dist/index.js`) を
      # import する。`@self/syndication` は `exports: "./src/index.ts"` で source
      # 直参照なので build 不要。setup action は `pnpm install` のみで build を
      # 回さないので、`@self/content` だけ明示 build する。`deploy-ryantsuji-dev`
      # と同じく turbo 経由にして remote/local cache を効かせる。
      - name: Build @self/content
        shell: bash
        run: pnpm turbo run build --filter=@self/content

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github-actions
          service_account: ${{ vars.PULUMI_CI_SA_EMAIL }}

      # dev.to API key を SSoT (GCP Secret Manager `dev-to-api-key`) から取得し
      # ::add-mask:: で log mask 化してから job env に注入。
      - name: Fetch DEV_TO_API_KEY from Secret Manager
        id: devto-key
        run: |
          token=$(gcloud secrets versions access latest \
            --secret=dev-to-api-key \
            --project=${{ vars.GCP_PROJECT_ID }})
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      # Zenn sync 用 SSH deploy key (ryantsuji-dev-content 書き込み権限) を取得。
      # 秘密鍵を `~/.ssh/id_ed25519` に書いて chmod 600、github.com の host key を
      # known_hosts に登録。これで `git@github.com:thujikun/ryantsuji-dev-content.git`
      # 形式の URL がそのまま使える (SSH default、`ZENN_REPO_REMOTE` env は未設定で OK)。
      - name: Setup SSH deploy key for ryantsuji-dev-content
        run: |
          key=$(gcloud secrets versions access latest \
            --secret=ryantsuji-dev-content-deploy-key \
            --project=${{ vars.GCP_PROJECT_ID }})
          mkdir -p ~/.ssh
          printf '%s\n' "$key" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

      # `--global` 必須: syndicate.ts は `$RUNNER_TEMP/ryantsuji-dev-content` に
      # 別 repo を clone してその中で `git commit` する (Zenn 同期経路)。`--global`
      # 無しだと self-management clone にしか identity が効かず、Zenn repo 側で
      # `empty ident name` で commit が落ちる。
      - name: Configure git identity (bot)
        run: |
          git config --global user.name "ryantsuji-dev syndication bot"
          git config --global user.email "noreply@github.com"

      # parent repo の `actions/checkout` は submodule の local config に以下 2 つを書く:
      #   - `http.https://github.com/.extraheader` (GITHUB_TOKEN 注入用)
      #   - `url.https://github.com/.insteadOf = git@github.com:` (= submodule の
      #     SSH 形式 URL を HTTPS に rewrite して GITHUB_TOKEN で fetch する仕掛け)
      # この `insteadOf` が残ったまま origin URL を SSH に張り替えても、push 時に
      # `git@github.com:` → `https://github.com/` に rewrite されて結局 GITHUB_TOKEN
      # 認証 (= github-actions[bot]) で 403 になる。deploy key 経由 SSH push のために
      # `extraheader` と `insteadOf` を先に外してから origin を SSH 形式に張り替える。
      - name: Switch submodule remote to SSH
        run: |
          cd apps/ryantsuji-dev/web/content
          git config --local --unset-all "http.https://github.com/.extraheader" || true
          git config --local --unset-all "url.https://github.com/.insteadOf" || true
          git remote set-url origin git@github.com:thujikun/ryantsuji-dev-content.git

      # Zenn 側 repo を `$RUNNER_TEMP/ryantsuji-dev-content` に clone (= publishToZenn
      # の `repoDir`)。SSH key 認証で git@github.com:... 経由で push する。
      - name: Run syndication (Zenn + dev.to, include drafts)
        env:
          DEV_TO_API_KEY: ${{ steps.devto-key.outputs.token }}
          RYANTSUJI_CONTENT_REPO_DIR: ${{ runner.temp }}/ryantsuji-dev-content
        run: pnpm exec tsx scripts/syndicate.cli.ts --target all --publish --include-drafts

      # syndicate が frontmatter に `syndication.zenn.id` / `syndication.devto.{id,slug}`
      # を書き戻していたら二段 commit する:
      # (1) submodule (ryantsuji-dev-content) 側で `posts/` の diff を commit + push
      # (2) 親 repo (self-management) 側で submodule pointer を bump して commit + push
      # 親 repo から `git status --porcelain apps/.../content/posts/` を打っても
      # submodule 内のパスは pathspec として届かず空応答を返すので、submodule 内に
      # `pushd` してから検出 → 内側で commit する経路が必須。`[skip ci]` で deploy /
      # syndicate の二重発火を抑止する。
      - name: Commit & push frontmatter writeback (if any)
        run: |
          pushd apps/ryantsuji-dev/web/content
          if [ -z "$(git status --porcelain posts/)" ]; then
            echo "no frontmatter changes — skipping commit"
            popd
            exit 0
          fi
          # syndicate が frontmatter を書き換えた直後で workdir は dirty。`--autostash`
          # 無しだと rebase が abort するので明示。並列 push が同 window に着地した
          # ケースでも safe に rebase できる。
          git pull --rebase --autostash origin main
          git add posts/
          # `[skip ci]` 風文字列は無し: content repo の dispatch-on-push.yml がこの push
          # を拾って parent monorepo の bump-submodule.yml を kick する設計
          # (= submodule pointer bump は PR 経由で main protection を通る)
          git commit -m "chore(syndication): writeback syndication IDs"
          git push origin HEAD:main
          popd
          # 親 repo の submodule pointer 直 push は branch protection で reject される
          # ため除去。content repo 側 dispatch-on-push.yml → monorepo bump-submodule.yml
          # の PR auto-merge chain に委ねる。
