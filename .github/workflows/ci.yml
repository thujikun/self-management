# self-management CI ワークフロー。
#
# gate 一覧は `scripts/hooks/gates.sh list` が single source of truth。
# pre-commit hook も同じ list を consume するので、CI と hook で gate が drift しない
# (構造的に不可能。PR #41 で観測した「format:check が hook 漏れで CI で初めて落ちた」事故の根絶)。
#
# runner: ubuntu-latest (public repo は free 無制限)。
# 各 gate は matrix 並列で実行 (旧 5 jobs → matrix で gate ごとに 1 job、計 10 並列)。
# turbo cache は build / typecheck で復元、他 gate は不要。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  list-gates:
    runs-on: ubuntu-latest
    outputs:
      gates: ${{ steps.list.outputs.gates }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: List gates from gates.sh (single source of truth)
        id: list
        run: |
          GATES=$(bash scripts/hooks/gates.sh list full | jq -R . | jq -s . -c)
          echo "gates=$GATES" >> "$GITHUB_OUTPUT"

  gate:
    needs: list-gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gate: ${{ fromJSON(needs.list-gates.outputs.gates) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Restore turbo cache (build / typecheck / test-coverage)
        if: matrix.gate == 'build' || matrix.gate == 'typecheck' || matrix.gate == 'test-coverage'
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - name: Run gate
        run: bash scripts/hooks/gates.sh run "${{ matrix.gate }}" full
        shell: bash
