# content repo (thujikun/ryantsuji-dev-content) からの repository_dispatch を受けて、
# `apps/ryantsuji-dev/web/content` submodule pointer を最新 main の SHA に bump する
# PR を開き、auto-merge を仕込む workflow。
#
# 流れ:
# 1. content repo の schedule-publish.yml (cron) または dispatch-on-push.yml (人手 push)
#    が `content-updated` event_type で本 workflow を kick
# 2. submodule を `--remote` 付きで update (= content repo origin/main の HEAD に追従)
# 3. submodule pointer が変わっていれば branch を切って commit + push
# 4. PR を開き、squash auto-merge を仕込む
# 5. CI が通れば自動 merge → main 反映 → deploy / syndicate へ伝播
#
# secrets:
# - `APP_ID` / `APP_PRIVATE_KEY`: GitHub App (両 repo に install 済み) の credentials。
#   default GITHUB_TOKEN で PR を開いても GITHUB_TOKEN 由来の push は cascade
#   workflow を発火しないため、PR 上で CI が回らず auto-merge が永遠に待ち続ける。
#   App installation token で push すれば pull_request trigger が普通に発火し、
#   かつ user PAT と違って独立した 5000/hr quota を持つ。
#   詳細セットアップ手順: docs/operations/github-app-setup.md
#
# manual setup (リポジトリ設定):
# - Settings → General → "Allow auto-merge" を ON
# - branch protection main の required status checks に CI / Deploy が含まれていれば
#   そのまま auto-merge は status 待ちで安全に止まる
name: Bump content submodule

on:
  repository_dispatch:
    types: [content-updated]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason (for audit / commit message)"
        required: false
        default: "manual"

permissions:
  contents: read

concurrency:
  group: bump-submodule
  cancel-in-progress: false

jobs:
  bump:
    name: Open PR to bump content submodule pointer
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Generate App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout (with App token, so PR push cascades CI)
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: true

      - name: Configure git identity (bot)
        run: |
          git config user.name "ryantsuji-dev-content sync bot"
          git config user.email "noreply@github.com"

      # submodule pointer を content repo の最新 main に倒すだけなので merge は不要。
      # `--merge` を使うと content repo の history rewrite (= 過去 SHA が全置換され、
      # 親が pin する旧 SHA が現 main 系譜から外れる) 後に「refusing to merge
      # unrelated histories」で落ちる。fetch + detached checkout なら共通祖先の
      # 有無に関わらず常に最新 main の SHA を指せる。
      - name: Update submodule to latest main
        id: update
        run: |
          git -C apps/ryantsuji-dev/web/content fetch origin main
          git -C apps/ryantsuji-dev/web/content checkout --force --detach origin/main
          if [ -z "$(git status --porcelain apps/ryantsuji-dev/web/content)" ]; then
            echo "no submodule pointer change — exit early"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          new_sha=$(git -C apps/ryantsuji-dev/web/content rev-parse --short HEAD)
          echo "new_sha=$new_sha" >> "$GITHUB_OUTPUT"

      - name: Create branch + commit pointer bump
        if: steps.update.outputs.changed == 'true'
        id: branch
        env:
          BUMP_REASON: ${{ github.event.client_payload.reason || github.event.inputs.reason || 'unknown' }}
          BUMP_SLUGS: ${{ github.event.client_payload.slugs || '-' }}
          BUMP_SHA: ${{ steps.update.outputs.new_sha }}
        run: |
          branch="bot/content-bump-${BUMP_SHA}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          git checkout -b "$branch"
          git add apps/ryantsuji-dev/web/content
          # subject に slugs を載せると 100 字 cap を踏むので固定 subject、本文に payload
          # client_payload は env 経由で quoted expansion することで shell injection を遮断する
          git commit \
            -m "chore(content): bump submodule pointer to ${BUMP_SHA}" \
            -m "reason: ${BUMP_REASON}" \
            -m "slugs: ${BUMP_SLUGS}"
          git push origin "$branch"

      - name: Open PR + enable auto-merge
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BUMP_REASON: ${{ github.event.client_payload.reason || github.event.inputs.reason || 'unknown' }}
          BUMP_SLUGS: ${{ github.event.client_payload.slugs || '-' }}
          BUMP_SHA: ${{ steps.update.outputs.new_sha }}
          BUMP_BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          # `automation` label を idempotent に揃える (--force で既存なら no-op 更新)。
          # これを省くと初回 dispatch で `gh pr create --label automation` が
          # `could not add label: 'automation' not found` で非ゼロ exit する。
          gh label create automation \
            --color ededed \
            --description "Bot-opened PR (bump-submodule etc.)" \
            --force
          body=$(printf 'Auto-generated by bump-submodule workflow on content-updated dispatch.\n\nreason: %s\nslugs: %s\ncontent sha: %s\n' \
            "$BUMP_REASON" "$BUMP_SLUGS" "$BUMP_SHA")
          pr_url=$(gh pr create \
            --base main \
            --head "$BUMP_BRANCH" \
            --title "chore(content): bump submodule to $BUMP_SHA" \
            --body "$body" \
            --label automation)
          echo "Opened: $pr_url"
          gh pr merge "$pr_url" --auto --squash --delete-branch
